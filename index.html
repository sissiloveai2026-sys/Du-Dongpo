<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="使用 Three.js 实现的苏东坡 3D 地球诗食地图，展示眉山、杭州、惠州的诗词和美食。"
    />
    <title>苏东坡 3D 诗食地图</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #020611;
        color: #ffffff;
        font-family:
          Inter, "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
      }

      #app {
        position: relative;
        width: 100%;
        height: 100%;
      }

      #earth-canvas {
        display: block;
        width: 100%;
        height: 100%;
        cursor: grab;
      }

      #earth-canvas:active {
        cursor: grabbing;
      }

      .panel {
        position: absolute;
        top: 24px;
        left: 24px;
        max-width: 380px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 22px;
        padding: 18px 20px;
        background: rgba(4, 10, 25, 0.62);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.36);
        backdrop-filter: blur(16px);
      }

      .panel h1 {
        margin: 0 0 10px;
        font-size: clamp(1.75rem, 4vw, 3rem);
        letter-spacing: -0.06em;
      }

      .panel p {
        margin: 0;
        color: #d8e7ff;
        line-height: 1.7;
      }

      .texture-url {
        display: block;
        margin-top: 14px;
        overflow-wrap: anywhere;
        color: #8ec7ff;
        font-size: 0.78rem;
      }

      .city-search {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        margin-top: 16px;
      }

      .city-search input,
      .city-search button {
        min-height: 42px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 999px;
        font: inherit;
      }

      .city-search input {
        min-width: 0;
        padding: 0 15px;
        outline: none;
        background: rgba(255, 255, 255, 0.1);
        color: #ffffff;
      }

      .city-search input::placeholder {
        color: rgba(216, 231, 255, 0.66);
      }

      .city-search button {
        padding: 0 17px;
        background: linear-gradient(135deg, #f0c17a, #a94735);
        color: #23120d;
        cursor: pointer;
        font-weight: 700;
      }

      .search-status {
        min-height: 20px;
        margin-top: 8px;
        color: #f0d69d;
        font-size: 0.86rem;
      }

      .city-card {
        position: absolute;
        right: 24px;
        top: 50%;
        width: min(390px, calc(100vw - 48px));
        max-height: calc(100vh - 48px);
        overflow: auto;
        border: 1px solid rgba(232, 204, 152, 0.34);
        border-radius: 28px;
        padding: 24px;
        background:
          linear-gradient(135deg, rgba(251, 244, 222, 0.22), rgba(92, 61, 35, 0.14)),
          rgba(14, 20, 25, 0.52);
        box-shadow:
          inset 0 0 36px rgba(255, 248, 220, 0.08),
          0 24px 76px rgba(0, 0, 0, 0.42);
        backdrop-filter: blur(22px) saturate(1.15);
        color: #fff5df;
        opacity: 0;
        pointer-events: none;
        transform: translateY(-46%) translateX(18px) scale(0.98);
        transition:
          opacity 220ms ease,
          transform 220ms ease;
      }

      .city-card.is-visible {
        opacity: 1;
        pointer-events: auto;
        transform: translateY(-50%) translateX(0) scale(1);
      }

      .city-card::before {
        position: absolute;
        inset: 10px;
        border: 1px solid rgba(232, 204, 152, 0.18);
        border-radius: 22px;
        content: "";
        pointer-events: none;
      }

      .city-card__close {
        position: absolute;
        top: 16px;
        right: 16px;
        width: 34px;
        height: 34px;
        border: 1px solid rgba(232, 204, 152, 0.25);
        border-radius: 999px;
        background: rgba(53, 28, 20, 0.4);
        color: #fff0d2;
        cursor: pointer;
      }

      .city-card__eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin: 0 0 10px;
        color: #e8c886;
        font-size: 0.8rem;
        letter-spacing: 0.18em;
      }

      .city-card__eyebrow::before {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #b4372d;
        box-shadow: 0 0 18px rgba(255, 77, 57, 0.9);
        content: "";
      }

      .city-card h2 {
        margin: 0 42px 12px 0;
        color: #fff8e8;
        font-family: "Noto Serif SC", "Songti SC", "STSong", serif;
        font-size: clamp(1.7rem, 4vw, 2.55rem);
        letter-spacing: -0.04em;
      }

      .city-card__poem-title,
      .city-card__food-name {
        margin: 0;
        color: #f2d08f;
        font-family: "Noto Serif SC", "Songti SC", "STSong", serif;
        font-size: 1.02rem;
        font-weight: 700;
      }

      .city-card__poem {
        margin: 12px 0 18px;
        border-left: 3px solid rgba(180, 55, 45, 0.86);
        padding-left: 16px;
        color: #fff7e8;
        font-family: "Noto Serif SC", "Songti SC", "STSong", serif;
        font-size: 1.14rem;
        line-height: 1.85;
      }

      .city-card__poem span {
        display: block;
      }

      .city-card__section {
        margin-top: 18px;
        border-top: 1px solid rgba(232, 204, 152, 0.18);
        padding-top: 18px;
      }

      .city-card__food-desc,
      .city-card__coords,
      .city-card__source {
        margin: 8px 0 0;
        color: #eadbc2;
        line-height: 1.75;
      }

      .city-card__coords,
      .city-card__source {
        color: #c9d9ef;
        font-size: 0.88rem;
      }

      .city-card__source {
        color: #f0d69d;
      }

      .city-card__seal {
        position: absolute;
        right: 24px;
        bottom: 20px;
        display: grid;
        width: 52px;
        height: 52px;
        place-items: center;
        border: 2px solid rgba(255, 221, 199, 0.58);
        border-radius: 12px;
        color: #ffe1c7;
        background: rgba(158, 38, 30, 0.68);
        font-family: "Noto Serif SC", "Songti SC", "STSong", serif;
        font-size: 0.92rem;
        line-height: 1.05;
        text-align: center;
      }

      .hint {
        position: absolute;
        right: 24px;
        bottom: 24px;
        border-radius: 999px;
        padding: 12px 18px;
        background: rgba(4, 10, 25, 0.62);
        color: #d8e7ff;
        font-size: 0.95rem;
        backdrop-filter: blur(16px);
      }

      @media (max-width: 640px) {
        .panel {
          top: 16px;
          left: 16px;
          right: 16px;
          max-width: none;
        }

        .city-search {
          grid-template-columns: 1fr;
        }

        .hint {
          right: 16px;
          bottom: 16px;
          left: 16px;
          text-align: center;
        }

        .city-card {
          right: 16px;
          bottom: 76px;
          top: auto;
          width: calc(100vw - 32px);
          max-height: 52vh;
          transform: translateY(16px) scale(0.98);
        }

        .city-card.is-visible {
          transform: translateY(0) scale(1);
        }
      }
    </style>
  </head>
  <body>
    <main id="app">
      <canvas id="earth-canvas" aria-label="苏东坡主要城市 3D 地球地图"></canvas>
      <section class="panel">
        <h1>苏东坡 3D 诗食地图</h1>
        <p>在 3D 地球上查看苏东坡去过的眉山、杭州、惠州。点击红色城市标记，弹出诗词和美食卡片。</p>
        <span class="texture-url" id="texture-url"></span>
        <form class="city-search" id="city-search">
          <input
            id="city-search-input"
            type="search"
            name="city"
            placeholder="输入城市名，如 惠州"
            autocomplete="off"
            aria-label="搜索城市"
          />
          <button type="submit">飞往城市</button>
        </form>
        <div class="search-status" id="search-status" aria-live="polite"></div>
      </section>
      <article class="city-card" id="city-card" aria-live="polite">
        <button class="city-card__close" id="city-card-close" type="button" aria-label="关闭城市卡片">
          ×
        </button>
        <p class="city-card__eyebrow">苏东坡诗食坐标</p>
        <h2 id="card-city-name">城市</h2>
        <p class="city-card__poem-title" id="card-poem-title"></p>
        <blockquote class="city-card__poem" id="card-poem-excerpt"></blockquote>
        <section class="city-card__section">
          <p class="city-card__food-name" id="card-food-name"></p>
          <p class="city-card__food-desc" id="card-food-description"></p>
          <p class="city-card__coords" id="card-coordinates"></p>
          <p class="city-card__source" id="card-poem-source"></p>
        </section>
        <div class="city-card__seal">东坡<br />食记</div>
      </article>
      <div class="hint">拖拽旋转 · 滚轮缩放</div>
    </main>

    <script type="module">
      import * as THREE from 'three';
      import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
      import poemData from './poems.json';

      const EARTH_TEXTURE_URL =
        'https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg';
      const EARTH_RADIUS = 1.6;
      const MARKER_RADIUS = 1.66;
      const LYCHEE_CITY_NAME = '惠州';
      const LYCHEE_PARTICLE_COUNT = 150;
      const POEM_API_URL = 'https://v1.jinrishici.com/';
      const POEM_FETCH_TIMEOUT_MS = 3200;

      const canvas = document.querySelector('#earth-canvas');
      const textureUrl = document.querySelector('#texture-url');
      const citySearchForm = document.querySelector('#city-search');
      const citySearchInput = document.querySelector('#city-search-input');
      const searchStatus = document.querySelector('#search-status');
      const cityCard = document.querySelector('#city-card');
      const cityCardClose = document.querySelector('#city-card-close');
      const cardCityName = document.querySelector('#card-city-name');
      const cardPoemTitle = document.querySelector('#card-poem-title');
      const cardPoemExcerpt = document.querySelector('#card-poem-excerpt');
      const cardFoodName = document.querySelector('#card-food-name');
      const cardFoodDescription = document.querySelector('#card-food-description');
      const cardCoordinates = document.querySelector('#card-coordinates');
      const cardPoemSource = document.querySelector('#card-poem-source');
      textureUrl.textContent = `地图纹理：${EARTH_TEXTURE_URL}`;

      const renderer = new THREE.WebGLRenderer({
        canvas,
        antialias: true,
      });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.outputColorSpace = THREE.SRGBColorSpace;

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x020611);
      scene.fog = new THREE.Fog(0x020611, 8, 18);

      const camera = new THREE.PerspectiveCamera(
        45,
        window.innerWidth / window.innerHeight,
        0.1,
        100,
      );
      camera.position.set(0, 0.35, 5);

      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.06;
      controls.enablePan = false;
      controls.minDistance = 2.6;
      controls.maxDistance = 8;
      controls.rotateSpeed = 0.55;
      controls.zoomSpeed = 0.85;

      const ambientLight = new THREE.AmbientLight(0x9dbfff, 1.35);
      scene.add(ambientLight);

      const sunLight = new THREE.DirectionalLight(0xffffff, 2.4);
      sunLight.position.set(5, 3, 5);
      scene.add(sunLight);

      const rimLight = new THREE.DirectionalLight(0x70a8ff, 1.1);
      rimLight.position.set(-4, 1.8, -3);
      scene.add(rimLight);

      const earthGroup = new THREE.Group();
      scene.add(earthGroup);

      const markerGroup = new THREE.Group();
      earthGroup.add(markerGroup);

      const textureLoader = new THREE.TextureLoader();
      textureLoader.setCrossOrigin('anonymous');
      const earthMaterial = new THREE.MeshStandardMaterial({
        map: createFallbackEarthTexture(),
        roughness: 0.82,
        metalness: 0.02,
      });
      textureLoader.load(
        EARTH_TEXTURE_URL,
        (earthTexture) => {
          earthTexture.colorSpace = THREE.SRGBColorSpace;
          earthMaterial.map = earthTexture;
          earthMaterial.needsUpdate = true;
        },
        undefined,
        (error) => {
          console.error('地图纹理加载失败，已使用本地兜底纹理:', error);
          textureUrl.textContent = `地图纹理加载失败，当前使用本地兜底纹理。原始 URL：${EARTH_TEXTURE_URL}`;
        },
      );

      const earth = new THREE.Mesh(
        new THREE.SphereGeometry(EARTH_RADIUS, 96, 96),
        earthMaterial,
      );
      earthGroup.add(earth);

      const atmosphere = new THREE.Mesh(
        new THREE.SphereGeometry(EARTH_RADIUS + 0.06, 96, 96),
        new THREE.MeshBasicMaterial({
          color: 0x4aa3ff,
          transparent: true,
          opacity: 0.18,
          side: THREE.BackSide,
        }),
      );
      earthGroup.add(atmosphere);

      const markerMeshes = createCityMarkers(poemData.cities);
      const raycaster = new THREE.Raycaster();
      const pointer = new THREE.Vector2();
      const stars = createStarField();
      const clock = new THREE.Clock();
      let lycheeEffect = null;
      let cameraFlight = null;
      let autoRotateEnabled = true;
      let poemRequestId = 0;
      scene.add(stars);

      function createCityMarkers(cities) {
        const markers = [];

        cities.forEach((city) => {
          const { latitude, longitude } = city.coordinates;
          const position = latLonToVector3(latitude, longitude, MARKER_RADIUS);

          const marker = new THREE.Mesh(
            new THREE.SphereGeometry(0.035, 24, 24),
            new THREE.MeshStandardMaterial({
              color: 0xff342c,
              emissive: 0xff1b12,
              emissiveIntensity: 1.7,
              roughness: 0.32,
            }),
          );
          marker.position.copy(position);
          marker.userData.city = city;

          const halo = new THREE.Mesh(
            new THREE.RingGeometry(0.055, 0.085, 36),
            new THREE.MeshBasicMaterial({
              color: 0xff5b4f,
              transparent: true,
              opacity: 0.58,
              side: THREE.DoubleSide,
            }),
          );
          halo.position.copy(position.clone().normalize().multiplyScalar(MARKER_RADIUS - 0.002));
          halo.lookAt(position.clone().multiplyScalar(2));

          markerGroup.add(marker, halo);
          markers.push(marker);
        });

        return markers;
      }

      function latLonToVector3(latitude, longitude, radius) {
        const phi = THREE.MathUtils.degToRad(90 - latitude);
        const theta = THREE.MathUtils.degToRad(longitude + 180);

        return new THREE.Vector3(
          -radius * Math.sin(phi) * Math.cos(theta),
          radius * Math.cos(phi),
          radius * Math.sin(phi) * Math.sin(theta),
        );
      }

      function createFallbackEarthTexture() {
        const textureCanvas = document.createElement('canvas');
        textureCanvas.width = 1024;
        textureCanvas.height = 512;
        const context = textureCanvas.getContext('2d');

        const oceanGradient = context.createLinearGradient(0, 0, 0, textureCanvas.height);
        oceanGradient.addColorStop(0, '#0b2d5c');
        oceanGradient.addColorStop(0.52, '#0f5f8e');
        oceanGradient.addColorStop(1, '#06172f');
        context.fillStyle = oceanGradient;
        context.fillRect(0, 0, textureCanvas.width, textureCanvas.height);

        context.fillStyle = 'rgba(122, 157, 89, 0.72)';
        drawFallbackLand(context, [
          [0.57, 0.28],
          [0.66, 0.22],
          [0.76, 0.25],
          [0.79, 0.34],
          [0.72, 0.45],
          [0.62, 0.47],
          [0.55, 0.38],
        ]);
        drawFallbackLand(context, [
          [0.18, 0.27],
          [0.31, 0.22],
          [0.38, 0.34],
          [0.32, 0.49],
          [0.2, 0.5],
          [0.14, 0.38],
        ]);
        drawFallbackLand(context, [
          [0.33, 0.52],
          [0.42, 0.58],
          [0.39, 0.8],
          [0.31, 0.86],
          [0.27, 0.68],
        ]);

        context.strokeStyle = 'rgba(220, 239, 255, 0.2)';
        context.lineWidth = 1;
        for (let x = 0; x <= textureCanvas.width; x += 128) {
          context.beginPath();
          context.moveTo(x, 0);
          context.lineTo(x, textureCanvas.height);
          context.stroke();
        }

        const texture = new THREE.CanvasTexture(textureCanvas);
        texture.colorSpace = THREE.SRGBColorSpace;
        return texture;
      }

      function drawFallbackLand(context, points) {
        context.beginPath();
        points.forEach(([x, y], index) => {
          const canvasX = x * context.canvas.width;
          const canvasY = y * context.canvas.height;
          if (index === 0) {
            context.moveTo(canvasX, canvasY);
          } else {
            context.lineTo(canvasX, canvasY);
          }
        });
        context.closePath();
        context.fill();
      }

      function createLycheeParticleEffect(city) {
        const basePosition = latLonToVector3(
          city.coordinates.latitude,
          city.coordinates.longitude,
          MARKER_RADIUS + 0.02,
        );
        const normal = basePosition.clone().normalize();
        const basis = createSurfaceBasis(normal);
        const group = new THREE.Group();
        const geometry = new THREE.SphereGeometry(1, 12, 12);
        const material = new THREE.MeshBasicMaterial({
          transparent: true,
          opacity: 0.92,
          depthWrite: false,
          vertexColors: true,
        });
        const mesh = new THREE.InstancedMesh(geometry, material, LYCHEE_PARTICLE_COUNT);
        const particles = [];
        const matrix = new THREE.Matrix4();
        const color = new THREE.Color();

        mesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);

        for (let index = 0; index < LYCHEE_PARTICLE_COUNT; index += 1) {
          const isPink = index % 5 !== 0;
          mesh.setColorAt(index, color.set(isPink ? 0xff7aa8 : 0xfff4f7));
          particles.push(createLycheeParticle(index / LYCHEE_PARTICLE_COUNT));
          matrix.makeScale(0.001, 0.001, 0.001);
          mesh.setMatrixAt(index, matrix);
        }

        mesh.instanceColor.needsUpdate = true;
        group.add(mesh);

        // A faint Song-painting-like canopy helps the falling fruit read as a lychee tree.
        const canopy = new THREE.Mesh(
          new THREE.SphereGeometry(0.24, 24, 16),
          new THREE.MeshBasicMaterial({
            color: 0x88b56a,
            transparent: true,
            opacity: 0.13,
            depthWrite: false,
          }),
        );
        canopy.position.copy(
          basePosition
            .clone()
            .add(normal.clone().multiplyScalar(0.42))
            .add(basis.forward.clone().multiplyScalar(0.02)),
        );
        canopy.scale.set(1.25, 0.95, 0.72);
        group.add(canopy);

        return {
          group,
          mesh,
          particles,
          basePosition,
          basis,
          matrix,
        };
      }

      function createSurfaceBasis(normal) {
        const reference = Math.abs(normal.y) > 0.9 ? new THREE.Vector3(1, 0, 0) : new THREE.Vector3(0, 1, 0);
        const right = new THREE.Vector3().crossVectors(reference, normal).normalize();
        const forward = new THREE.Vector3().crossVectors(normal, right).normalize();

        return {
          up: normal,
          right,
          forward,
        };
      }

      function createLycheeParticle(seed) {
        const angle = Math.random() * Math.PI * 2;
        const canopyRadius = Math.sqrt(Math.random()) * 0.32;

        return {
          x: Math.cos(angle) * canopyRadius,
          z: Math.sin(angle) * canopyRadius * 0.72,
          startHeight: 0.66 + Math.random() * 0.2,
          fallDistance: 0.48 + Math.random() * 0.22,
          speed: 0.035 + Math.random() * 0.04,
          phase: Math.random() * Math.PI * 2,
          progress: seed,
          minSize: 0.004 + Math.random() * 0.004,
          maxSize: 0.02 + Math.random() * 0.023,
        };
      }

      function showLycheeParticleEffect(city) {
        clearLycheeParticleEffect();

        if (city.cityName !== LYCHEE_CITY_NAME) {
          return;
        }

        lycheeEffect = createLycheeParticleEffect(city);
        earthGroup.add(lycheeEffect.group);
      }

      function clearLycheeParticleEffect() {
        if (!lycheeEffect) {
          return;
        }

        earthGroup.remove(lycheeEffect.group);
        lycheeEffect.group.traverse((object) => {
          if (object.geometry) object.geometry.dispose();
          if (object.material) object.material.dispose();
        });
        lycheeEffect = null;
      }

      function updateLycheeParticles(delta, elapsed) {
        if (!lycheeEffect) {
          return;
        }

        const { mesh, particles, basePosition, basis, matrix } = lycheeEffect;
        const position = new THREE.Vector3();
        const scale = new THREE.Vector3();
        const quaternion = new THREE.Quaternion();

        particles.forEach((particle, index) => {
          particle.progress = (particle.progress + delta * particle.speed) % 1;

          const driftX = Math.sin(elapsed * 0.85 + particle.phase) * 0.035;
          const driftZ = Math.cos(elapsed * 0.68 + particle.phase) * 0.026;
          const height = particle.startHeight - particle.fallDistance * particle.progress;
          const grow = smoothstep(0.06, 0.86, particle.progress);
          const size = particle.minSize + (particle.maxSize - particle.minSize) * grow;

          position
            .copy(basePosition)
            .add(basis.up.clone().multiplyScalar(height))
            .add(basis.right.clone().multiplyScalar(particle.x + driftX))
            .add(basis.forward.clone().multiplyScalar(particle.z + driftZ));

          scale.setScalar(size);
          matrix.compose(position, quaternion, scale);
          mesh.setMatrixAt(index, matrix);
        });

        mesh.instanceMatrix.needsUpdate = true;
      }

      function smoothstep(edge0, edge1, value) {
        const x = THREE.MathUtils.clamp((value - edge0) / (edge1 - edge0), 0, 1);
        return x * x * (3 - 2 * x);
      }

      function findCityByName(cityName) {
        const normalizedQuery = cityName.trim().toLocaleLowerCase('zh-CN');

        return poemData.cities.find((city) => {
          const normalizedCity = city.cityName.toLocaleLowerCase('zh-CN');
          return normalizedCity === normalizedQuery || normalizedCity.includes(normalizedQuery);
        });
      }

      function flyToCity(city) {
        earthGroup.updateMatrixWorld(true);

        const cityWorldPosition = latLonToVector3(
          city.coordinates.latitude,
          city.coordinates.longitude,
          MARKER_RADIUS,
        ).applyMatrix4(earthGroup.matrixWorld);
        const cityNormal = cityWorldPosition.clone().normalize();
        const destination = cityNormal.clone().multiplyScalar(4.15);
        const target = cityNormal.clone().multiplyScalar(EARTH_RADIUS * 0.98);

        cameraFlight = {
          city,
          startedAt: performance.now(),
          duration: 1900,
          fromPosition: camera.position.clone(),
          toPosition: destination,
          fromTarget: controls.target.clone(),
          toTarget: target,
        };

        autoRotateEnabled = false;
        controls.enabled = false;
        searchStatus.textContent = `正在飞往${city.cityName}...`;
      }

      function updateCameraFlight() {
        if (!cameraFlight) {
          return;
        }

        const progress = THREE.MathUtils.clamp(
          (performance.now() - cameraFlight.startedAt) / cameraFlight.duration,
          0,
          1,
        );
        const easedProgress = easeInOutCubic(progress);

        camera.position.lerpVectors(
          cameraFlight.fromPosition,
          cameraFlight.toPosition,
          easedProgress,
        );
        controls.target.lerpVectors(
          cameraFlight.fromTarget,
          cameraFlight.toTarget,
          easedProgress,
        );
        camera.lookAt(controls.target);

        if (progress >= 1) {
          const { city } = cameraFlight;
          cameraFlight = null;
          controls.enabled = true;
          controls.update();
          const requestId = showCityCard(city);
          loadRemotePoemForCity(city, requestId);
          showLycheeParticleEffect(city);
          searchStatus.textContent = `已抵达${city.cityName}`;
        }
      }

      function easeInOutCubic(value) {
        return value < 0.5 ? 4 * value * value * value : 1 - ((-2 * value + 2) ** 3) / 2;
      }

      function createStarField() {
        const starCount = 1600;
        const positions = new Float32Array(starCount * 3);

        for (let index = 0; index < starCount; index += 1) {
          const radius = THREE.MathUtils.randFloat(9, 16);
          const theta = THREE.MathUtils.randFloat(0, Math.PI * 2);
          const phi = Math.acos(THREE.MathUtils.randFloatSpread(2));

          positions[index * 3] = radius * Math.sin(phi) * Math.cos(theta);
          positions[index * 3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
          positions[index * 3 + 2] = radius * Math.cos(phi);
        }

        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

        const material = new THREE.PointsMaterial({
          color: 0xd9ecff,
          size: 0.025,
          transparent: true,
          opacity: 0.85,
          sizeAttenuation: true,
        });

        return new THREE.Points(geometry, material);
      }

      async function fetchPoemByCity(cityName) {
        const cityKeywords = getCityPoemKeywords(cityName);
        let suShiFallback = null;

        for (let index = 0; index < 10; index += 1) {
          try {
            const poem = await fetchJsonWithTimeout(POEM_API_URL, POEM_FETCH_TIMEOUT_MS);
            if (!isPoemApiResponse(poem)) {
              continue;
            }

            const author = String(poem.author ?? '');
            const title = String(poem.origin ?? poem.title ?? '');
            const content = String(poem.content ?? '');
            const isSuShi = author === '苏轼' || author === '苏东坡';

            if (!isSuShi) {
              continue;
            }

            suShiFallback ??= poem;

            if (cityKeywords.some((keyword) => `${title}${content}`.includes(keyword))) {
              return poem;
            }
          } catch (error) {
            console.error('获取诗词失败:', error);
            break;
          }
        }

        return suShiFallback;
      }

      async function fetchJsonWithTimeout(url, timeoutMs) {
        const controller = new AbortController();
        const timeoutId = window.setTimeout(() => controller.abort(), timeoutMs);

        try {
          const response = await fetch(url, {
            signal: controller.signal,
            headers: {
              Accept: 'application/json',
            },
          });

          if (!response.ok) {
            throw new Error(`诗词接口返回 ${response.status}`);
          }

          return await response.json();
        } finally {
          window.clearTimeout(timeoutId);
        }
      }

      function isPoemApiResponse(poem) {
        return poem && typeof poem === 'object' && 'author' in poem && 'content' in poem;
      }

      function getCityPoemKeywords(cityName) {
        const keywordMap = {
          眉山: ['眉山', '蜀', '嘉州', '故乡'],
          杭州: ['杭州', '西湖', '湖上', '钱塘'],
          惠州: ['惠州', '罗浮', '岭南', '荔枝'],
        };

        return keywordMap[cityName] ?? [cityName];
      }

      async function loadRemotePoemForCity(city, requestId) {
        cardPoemSource.textContent = '正在尝试从今日诗词获取苏轼诗词...';
        const remotePoem = await fetchPoemByCity(city.cityName);

        if (requestId !== poemRequestId) {
          return;
        }

        if (!remotePoem) {
          cardPoemSource.textContent = '未从接口匹配到苏轼诗词，当前显示本地示例。';
          return;
        }

        const title = String(remotePoem.origin ?? city.poemTitle);
        const content = String(remotePoem.content ?? '');
        const lines = splitPoemContent(content);

        cardPoemTitle.textContent = `《${title}》`;
        renderPoemLines(lines.length > 0 ? lines : city.poemExcerpt);
        cardPoemSource.textContent = `今日诗词接口 · 已显示 origin 和 content · ${String(remotePoem.author ?? '苏轼')}`;
      }

      function splitPoemContent(content) {
        return String(content)
          .replace(/\s+/g, '')
          .split(/(?<=[，。！？；])/u)
          .map((line) => line.trim())
          .filter(Boolean);
      }

      function renderPoemLines(lines) {
        cardPoemExcerpt.replaceChildren(
          ...lines.map((line) => {
            const span = document.createElement('span');
            span.textContent = line;
            return span;
          }),
        );
      }

      function showCityCard(city) {
        const requestId = (poemRequestId += 1);

        cardCityName.textContent = city.cityName;
        cardPoemTitle.textContent = `《${city.poemTitle}》`;
        renderPoemLines(city.poemExcerpt);
        cardFoodName.textContent = city.foodName;
        cardFoodDescription.textContent = city.foodDescription;
        cardCoordinates.textContent = `坐标：${city.coordinates.latitude.toFixed(4)}, ${city.coordinates.longitude.toFixed(4)}`;
        cardPoemSource.textContent = '本地 poems.json 示例 · 正在联网更新诗词';
        cityCard.classList.add('is-visible');
        return requestId;
      }

      function updatePointer(event) {
        const rect = renderer.domElement.getBoundingClientRect();
        pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
        pointer.y = -(((event.clientY - rect.top) / rect.height) * 2 - 1);
      }

      function handleCanvasClick(event) {
        updatePointer(event);
        raycaster.setFromCamera(pointer, camera);

        const intersects = raycaster.intersectObjects(markerMeshes, false);
        const city = intersects[0]?.object.userData.city;
        if (city) {
          const requestId = showCityCard(city);
          loadRemotePoemForCity(city, requestId);
          showLycheeParticleEffect(city);
        }
      }

      function resize() {
        const width = window.innerWidth;
        const height = window.innerHeight;
        renderer.setSize(width, height, false);
        camera.aspect = width / height;
        camera.updateProjectionMatrix();
      }

      function animate() {
        requestAnimationFrame(animate);
        const delta = clock.getDelta();
        const elapsed = clock.elapsedTime;

        if (autoRotateEnabled && !cameraFlight) {
          earthGroup.rotation.y += 0.0015;
        }
        stars.rotation.y -= 0.0002;
        updateCameraFlight();
        updateLycheeParticles(delta, elapsed);
        controls.update();
        renderer.render(scene, camera);
      }

      window.addEventListener('resize', resize);
      canvas.addEventListener('click', handleCanvasClick);
      citySearchForm.addEventListener('submit', (event) => {
        event.preventDefault();

        const cityName = citySearchInput.value.trim();
        if (!cityName) {
          searchStatus.textContent = '请输入城市名，例如：惠州';
          return;
        }

        const city = findCityByName(cityName);
        if (!city) {
          searchStatus.textContent = `没有找到“${cityName}”，可搜索：${poemData.cities
            .map((item) => item.cityName)
            .join('、')}`;
          return;
        }

        flyToCity(city);
      });
      controls.addEventListener('start', () => {
        if (!cameraFlight) {
          autoRotateEnabled = true;
          searchStatus.textContent = '';
        }
      });
      cityCardClose.addEventListener('click', () => {
        cityCard.classList.remove('is-visible');
      });

      resize();
      animate();
    </script>
  </body>
</html>
